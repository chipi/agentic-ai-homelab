site_name: agentic-ai-homelab
site_description: How I work with agentic AI, end-to-end — cloud APIs, local infra, project scaffolding, agent harnesses.
site_url: https://chipi.github.io/agentic-ai-homelab/
site_author: Marko Dragoljevic

repo_name: chipi/agentic-ai-homelab
repo_url: https://github.com/chipi/agentic-ai-homelab
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

# Scoped AGENTS.md files (agent working-rules) live inside docs/ but are
# not published — they'd otherwise surface as orphan pages on the site.
exclude_docs: |
  AGENTS.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_javascript:
  - assets/js/external-links.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Philosophy: philosophy.md
  - Pillars:
    - Project setup: project-setup.md
    - Local AI infra: local-ai-infra.md
    - Cloud AI workflow: cloud-ai-workflow.md
    - Agent harnesses: agent-harnesses.md
  - Recipes:
    - DGX terminal dashboard: recipes/dgx-terminal-dashboard.md
    - GPU mode-swap: recipes/gpu-mode-swap.md
    - Observability boot: recipes/observability-boot.md
    - Token management (lean-ctx + RTK): recipes/token-management-lean-ctx-rtk.md
    - Chrome DevTools MCP agent loop: recipes/chrome-devtools-mcp-agent-loop.md
    - Consuming homelab services (${VAR} substitution): recipes/consuming-homelab-services.md
  - Reading:
    - Overview: reading/README.md
    - LLM stack — end-to-end: reading/llm-end-to-end.md
    - Self-hosting LLMs — end-to-end: reading/self-hosting-llms.md
    - Running your own coding models — end-to-end: reading/coding-models-local.md
    - Agentic coding — autonomous code agents: reading/agentic-coding.md
    - Orchestrating agents in autonomous mode: reading/agent-orchestration.md
    - a16z AI Canon: reading/a16z-ai-canon.md
    - State of AI Report: reading/state-of-ai-report.md
    - Anthropic Transformer Circuits: reading/anthropic-transformer-circuits.md
    - Lilian Weng — Lil'Log: reading/lilian-weng-blog.md
    - Andrej Karpathy — selected writing: reading/karpathy-blog.md
    - Jay Alammar — visual explainers: reading/jay-alammar-blog.md
    - Chip Huyen — production-AI writing: reading/chip-huyen-blog.md
    - Simon Willison — practitioner stream: reading/simon-willison-blog.md
  - Decisions (ADR):
    - Overview: adr/README.md
    - ADR-0001 — Repo scope: adr/ADR-0001-repo-scope.md
  - Proposals (RFC):
    - Overview: rfc/README.md
  - In progress:
    - Overview: wip/README.md
    - Next steps: wip/NEXT_STEPS.md
  - History:
    - Overview: history/README.md
    - "0001 — Genesis": history/0001-genesis.md
    - "0002 — Decisions log": history/0002-decisions.md
    - "0003 — v0.2 arc": history/0003-v0.2-arc.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chipi/agentic-ai-homelab
