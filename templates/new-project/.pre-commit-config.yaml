# Minimal pre-commit baseline. Add language-specific hooks once stack is
# picked. Goal: catch the universal mistakes (whitespace, large files,
# merge conflicts, accidental secrets) before they hit CI.
#
# Install:  pre-commit install
# Run all:  pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-case-conflict
      - id: mixed-line-ending

  # Secrets scanner — catches accidental .env / API key commits.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

