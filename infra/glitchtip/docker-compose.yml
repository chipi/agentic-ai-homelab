# GlitchTip — self-hosted error tracking (Sentry-SDK/DSN compatible).
# Part of the observability platform (ADR-0005). Tailnet-only, one host at a
# time (DGX now, Mac mini later). Apps report errors via a Sentry SDK pointed
# at a project DSN; split dev vs prod with the SDK `environment` tag
# (Mac coding agents + podcast app = dev; VPS = prod).
#
# Web UI + ingest publish to the tailnet IP only (GLITCHTIP_LISTEN). Postgres +
# Redis stay on the internal compose bridge. Reach the UI/ingest at
# http://<tailnet-ip>:${GLITCHTIP_PORT}. Images pinned; bump deliberately.

x-glitchtip-env: &glitchtip-env
  DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/glitchtip
  SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
  REDIS_URL: redis://redis:6379/0
  PORT: "8080"
  GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:?set GLITCHTIP_DOMAIN in .env}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-glitchtip@homelab.local}
  EMAIL_URL: ${EMAIL_URL:-consolemail://}
  ENABLE_OPEN_USER_REGISTRATION: "${ENABLE_OPEN_USER_REGISTRATION:-false}"
  CELERY_WORKER_AUTOSCALE: "1,3"
  CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
  # picked up by `manage.py createsuperuser --noinput` on first-run bootstrap
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@homelab.local}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}

x-logging: &logging
  logging:
    driver: json-file
    options: { max-size: "20m", max-file: "3" }

services:
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: glitchtip
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    <<: *logging

  redis:
    image: redis:7.4
    restart: unless-stopped
    <<: *logging

  migrate:
    image: glitchtip/glitchtip:6.2.2
    depends_on:
      postgres: { condition: service_healthy }
    environment: *glitchtip-env
    command: ./manage.py migrate
    restart: "no"
    <<: *logging

  web:
    image: glitchtip/glitchtip:6.2.2
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      migrate: { condition: service_completed_successfully }
    environment: *glitchtip-env
    ports:
      - "${GLITCHTIP_LISTEN:-127.0.0.1}:${GLITCHTIP_PORT:-8090}:8080"
    restart: unless-stopped
    <<: *logging

  worker:
    image: glitchtip/glitchtip:6.2.2
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      migrate: { condition: service_completed_successfully }
    environment: *glitchtip-env
    command: ./bin/run-celery-with-beat.sh
    restart: unless-stopped
    <<: *logging

volumes:
  pg-data:
