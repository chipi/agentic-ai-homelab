# homelab (Mac mini) self-monitoring collector — Alloy in a container on OrbStack.
# Bridge-networked (NOT host mode — macOS has no host networking). Reaches the
# native node_exporter + the local backend stores via host.docker.internal.
# Ships every container's logs to the local VictoriaLogs.
#
# Prereq: node_exporter running natively (brew) on :9100 — see README.
# Deploy:  cd infra/observability/hosts/homelab && docker compose up -d

services:
  alloy:
    image: grafana/alloy:v1.17.0
    container_name: alloy-homelab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro    # container-log discovery
    command:
      - run
      - --server.http.listen-addr=127.0.0.1:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }
    restart: unless-stopped
