services:
  vllm:
    image: nvcr.io/nvidia/vllm:25.11-py3
    container_name: vllm-coder-next
    runtime: nvidia
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    ports:
      - "${VLLM_PORT:-9000}:9000"
    volumes:
      - ${HF_HOME:-/opt/llm-models/huggingface}:/root/.cache/huggingface
      - ${VLLM_CACHE_PATH:-/opt/llm-models/vllm-cache}:/root/.cache/vllm
    env_file:
      # Repo-root master .env (HF_TOKEN + VLLM_API_KEY + everything else).
      # Container ends up with extra env vars it doesn't use (provider keys,
      # observability creds) — harmless for a personal homelab.
      - ../../../.env
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_CACHE=/root/.cache/huggingface
      - VLLM_DISABLE_TORCH_COMPILE=1
      - NVIDIA_VISIBLE_DEVICES=all
    command:
      - vllm
      - serve
      - Qwen/Qwen3-Coder-Next-FP8
      - --revision
      - da6e2ed27304dd39abadd9c82ef50e8de67bdd4c
      - --host
      - 0.0.0.0
      - --port
      - "9000"
      - --dtype
      - bfloat16
      - --max-model-len
      - "131072"
      - --gpu-memory-utilization
      # 0.75 default on GB10: the box has 121 GB unified CPU+GPU memory, so
      # 0.92 claims most of the host RAM too and crashes other workloads
      # (operator confirmed prior crash). Override transiently via
      # VLLM_GPU_MEM_UTIL for eval / contention tests on a quieter box.
      - "${VLLM_GPU_MEM_UTIL:-0.75}"
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --api-key
      - ${VLLM_API_KEY:-buddy-is-the-king}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:${VLLM_PORT:-9000}/health\")"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 600s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped
