services:
  vllm:
    image: nvcr.io/nvidia/vllm:25.11-py3
    container_name: vllm-openwebui
    runtime: nvidia
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    ports:
      - "9000:9000"
    volumes:
      - /opt/llm-models/huggingface:/root/.cache/huggingface
      - /opt/llm-models/vllm-cache:/root/.cache/vllm
    env_file:
      # Repo-root master .env (HF_TOKEN + VLLM_API_KEY + everything else).
      # Container ends up with extra env vars it doesn't use (provider keys,
      # observability creds) — harmless for a personal homelab.
      - ../../../.env
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_CACHE=/root/.cache/huggingface
      - VLLM_DISABLE_TORCH_COMPILE=1
      - NVIDIA_VISIBLE_DEVICES=all
    command:
      - vllm
      - serve
      - Qwen/Qwen2.5-7B-Instruct
      - --host
      - 0.0.0.0
      - --port
      - "9000"
      - --dtype
      - bfloat16
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.60"
      - --api-key
      - buddy-is-the-king
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:9000/health\")"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 600s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://vllm:9000/v1
      - OPENAI_API_KEY=buddy-is-the-king
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      vllm:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped

volumes:
  open-webui:
